<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:350px;
        }

        h1{
            margin-bottom:30px;
            color:#333;
        }

        button{
            width:100%;
            padding:15px;
            margin:10px 0;
            font-size:18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;
            transition:0.3s;
        }

        .user{
            background:#28a745;
        }

        .admin{
            background:#007bff;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Food Delivery System</h1>

        <button class="user" onclick="location.href='user.html'">
            User
        </button>

        <button class="admin" onclick="location.href='admin.html'">
            Admin
        </button>
    </div>

</body>
</html>
